<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Chat Widget</title>
</head>

<body>
  <h1>Page with Chat Widget</h1>
  <p>The chat widget should load in the corner. Configure or open it via the widget UI.</p>

<!-- Begin Kogents Chat Widget -->
<script type="text/javascript">
  window.KogentsChat ||
    (function (d, s, id) {
      var w = (window.KogentsChat = function (c) {
        w._.push(c);
      });
      w._ = [];
      var e = d.createElement(s);
      e.async = true;
      e.id = id;
      e.src = "https://api.kogents.com/widget/embed.js?key=5fede336-242a-4ce7-902d-ad370a5a4eab&chatbotId=8e43542a-8472-499e-91fd-682266f48138";
      var t = d.getElementsByTagName(s)[0];
      t.parentNode.insertBefore(e, t);
    })(document, "script", "kogents-chat-widget");
</script>
<!-- End Kogents Chat Widget --></body>

</html>
