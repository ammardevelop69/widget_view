<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Chat Widget</title>
</head>

<body>
  <h1>Page with Chat Widget</h1>
  <p>The chat widget should load in the corner. Configure or open it via the widget UI.</p>

<!-- Begin Kogents Chat Widget -->
<script type="text/javascript">
  window.KogentsChat ||
    (function (d, s, id) {
      var w = (window.KogentsChat = function (c) {
        w._.push(c);
      });
      w._ = [];
      var e = d.createElement(s);
      e.async = true;
      e.id = id;
      e.src = "http://localhost:7001/widget/embed.js?key=38965f43-1813-4bc0-9ca7-130794f4c840&chatbotId=7117af96-af3e-423e-b333-d8b09eb85b72";
      var t = d.getElementsByTagName(s)[0];
      t.parentNode.insertBefore(e, t);
    })(document, "script", "kogents-chat-widget");
</script>
<!-- End Kogents Chat Widget -->


</body>

</html>
